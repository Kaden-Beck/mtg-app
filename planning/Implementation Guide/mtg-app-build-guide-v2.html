<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTG App — Build Guide v2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-secondary: #f5f5f3;
  --bg-tertiary: #eeede9;
  --text: #1a1a18;
  --text-secondary: #6b6b67;
  --text-tertiary: #9b9b96;
  --border: rgba(0,0,0,0.12);
  --border-secondary: rgba(0,0,0,0.22);
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #0F6E56;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --blue-dark: #185FA5;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18;
    --bg-secondary: #242422;
    --bg-tertiary: #2c2c2a;
    --text: #f0efe9;
    --text-secondary: #a0a09b;
    --text-tertiary: #6b6b67;
    --border: rgba(255,255,255,0.10);
    --border-secondary: rgba(255,255,255,0.18);
    --green-light: #04342C;
    --green-dark: #9FE1CB;
    --blue-light: #042C53;
    --blue-dark: #85B7EB;
    --amber-light: #412402;
    --purple-light: #26215C;
  }
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.app { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem; }

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
}
.course-title {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}
.version-badge {
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--purple-light);
  color: var(--purple);
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 8px;
}
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-bar {
  width: 140px; height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.progress-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  min-width: 44px;
}

.layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 2.5rem;
}

@media (max-width: 640px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

.chapter-group { margin-bottom: 1.5rem; }
.chapter-label {
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 4px;
  padding: 0 8px;
}
.lesson-btn {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  transition: background 0.12s, color 0.12s;
  line-height: 1.4;
}
.lesson-btn:hover { background: var(--bg-secondary); color: var(--text); }
.lesson-btn.active { background: var(--bg-secondary); color: var(--text); }
.lesson-btn.done .dot { background: var(--green); }
.lesson-btn.active .dot { background: var(--blue); }
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-secondary);
  flex-shrink: 0;
  margin-top: 5px;
}

.lesson-header { margin-bottom: 1.75rem; }
.lesson-num {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.lesson-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.lesson-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.65;
}

.tags { margin-bottom: 10px; }
.tag {
  display: inline-block;
  font-size: 11px;
  font-family: var(--font-mono);
  padding: 2px 7px;
  border-radius: 4px;
  margin-right: 4px;
}
.tag-ts { background: var(--blue-light); color: var(--blue-dark); }
.tag-py { background: #EAF3DE; color: #3B6D11; }
.tag-gql { background: var(--purple-light); color: var(--purple); }
.tag-pg { background: #EAF3DE; color: #3B6D11; }
.tag-infra { background: var(--amber-light); color: var(--amber); }

@media (prefers-color-scheme: dark) {
  .tag-py { background: #173404; color: #C0DD97; }
  .tag-pg { background: #173404; color: #C0DD97; }
}

.section { margin-bottom: 1.75rem; }
.section-heading {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 0.5px solid var(--border);
}

.prose {
  font-size: 14px;
  color: var(--text);
  line-height: 1.75;
}
.prose p { margin-bottom: 10px; }
.prose strong { font-weight: 500; }
.prose code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-secondary);
  padding: 2px 5px;
  border-radius: 4px;
  color: var(--text);
}

.callout {
  border-left: 2px solid var(--blue);
  background: var(--blue-light);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 1rem;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.callout.warn { border-color: var(--amber); background: var(--amber-light); }
.callout.tip { border-color: var(--green); background: var(--green-light); }
.callout-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 3px;
  color: var(--blue);
}
.callout.warn .callout-label { color: var(--amber); }
.callout.tip .callout-label { color: var(--green); }

pre {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.1rem;
  overflow-x: auto;
  margin-bottom: 1rem;
}
pre code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--text);
  background: none;
  padding: 0;
  white-space: pre;
  line-height: 1.65;
}

.step-list { counter-reset: steps; list-style: none; padding: 0; margin-bottom: 1rem; }
.step-list li {
  counter-increment: steps;
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  align-items: flex-start;
  font-size: 14px;
  color: var(--text);
  line-height: 1.65;
}
.step-list li::before {
  content: counter(steps);
  min-width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  flex-shrink: 0;
  margin-top: 2px;
}
.step-list li code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-secondary);
  padding: 1px 5px;
  border-radius: 3px;
}

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2.5rem;
  padding-top: 1rem;
  border-top: 0.5px solid var(--border);
}
.nav-btn {
  background: none;
  border: 0.5px solid var(--border-secondary);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.nav-btn:hover:not(:disabled) { background: var(--bg-secondary); color: var(--text); }
.nav-btn.primary { border-color: var(--green); color: var(--green); }
.nav-btn.primary:hover { background: var(--green-light); color: var(--green-dark); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.complete-btn {
  background: none;
  border: 0.5px solid var(--green);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--green);
  cursor: pointer;
  transition: background 0.12s;
}
.complete-btn:hover { background: var(--green-light); }
.complete-btn.completed { background: var(--green-light); color: var(--green-dark); }
</style>
</head>

            content: `<p>Use SQLAlchemy 2.0 style (DeclarativeBase). All primary keys are UUIDs generated in Python. Prices stored as integers (cents). The <code>cards</code> table is a read-only Scryfall cache — only the sync job writes to it.</p>
            <div class="callout warn"><div class="callout-label">warning</div>Store all prices as <code>Integer</code> (cents), never <code>Float</code>. Float rounding will corrupt price history over time.</div>`
          },

            heading: "backend/app/db.py",
            code: `from sqlalchemy.ext.asyncio import (
    create_async_engine, async_sessionmaker, AsyncSession
)
from sqlalchemy.orm import DeclarativeBase
import os

DATABASE_URL = os.getenv(
    "DATABASE_URL",
    "postgresql+asyncpg://mtg:mtg@localhost:5432/mtg"
)

engine = create_async_engine(DATABASE_URL, echo=False)
AsyncSessionLocal = async_sessionmaker(
    engine, class_=AsyncSession, expire_on_commit=False
)

class Base(DeclarativeBase):
    pass

async def get_db():
    async with AsyncSessionLocal() as session:
        yield session`

            heading: "backend/app/models/models.py",
            code: `from sqlalchemy import (
    String, Integer, Boolean, Text,
    DateTime, ForeignKey, ARRAY, func

from sqlalchemy.dialects.postgresql import JSONB, UUID
from sqlalchemy.orm import Mapped, mapped_column, relationship
from app.db import Base
import uuid

class Card(Base):
    __tablename__ = "cards"

    id: Mapped[str] = mapped_column(String, primary_key=True)  # Scryfall UUID
    name: Mapped[str] = mapped_column(String, nullable=False, index=True)
    set_code: Mapped[str] = mapped_column(String, nullable=False)
    set_name: Mapped[str] = mapped_column(String, nullable=False)
    collector_number: Mapped[str] = mapped_column(String, nullable=False)
    mana_cost: Mapped[str | None] = mapped_column(String)
    cmc: Mapped[int] = mapped_column(Integer, default=0)
    type_line: Mapped[str] = mapped_column(String, nullable=False)
    oracle_text: Mapped[str | None] = mapped_column(Text)
    color_identity: Mapped[list] = mapped_column(ARRAY(String), default=[])
    rarity: Mapped[str] = mapped_column(String, nullable=False)
    price_usd: Mapped[int | None] = mapped_column(Integer)      # cents
    price_usd_foil: Mapped[int | None] = mapped_column(Integer) # cents
    price_eur: Mapped[int | None] = mapped_column(Integer)      # cents
    image_uris: Mapped[dict | None] = mapped_column(JSONB)
    legalities: Mapped[dict | None] = mapped_column(JSONB)
    scryfall_data: Mapped[dict] = mapped_column(JSONB, nullable=False)
    updated_at: Mapped[DateTime] = mapped_column(
        DateTime(timezone=True), server_default=func.now()
    )

class CollectionItem(Base):
    __tablename__ = "collection"

    id: Mapped[str] = mapped_column(
        String, primary_key=True, default=lambda: str(uuid.uuid4())
    )
    scryfall_id: Mapped[str] = mapped_column(
        String, ForeignKey("cards.id"), nullable=False, index=True
    )
    quantity: Mapped[int] = mapped_column(Integer, default=1)
    foil: Mapped[bool] = mapped_column(Boolean, default=False)
    condition: Mapped[str] = mapped_column(String, default="NM")
    language: Mapped[str] = mapped_column(String, default="en")
    purchase_price_cents: Mapped[int | None] = mapped_column(Integer)
    acquired_at: Mapped[DateTime] = mapped_column(
        DateTime(timezone=True), server_default=func.now()
    )
    notes: Mapped[str | None] = mapped_column(Text)
    card: Mapped["Card"] = relationship("Card")

class Deck(Base):
    __tablename__ = "decks"

    id: Mapped[str] = mapped_column(
        String, primary_key=True, default=lambda: str(uuid.uuid4())
    )
    name: Mapped[str] = mapped_column(String, nullable=False)
    format: Mapped[str] = mapped_column(String, default="commander")
    description: Mapped[str | None] = mapped_column(Text)
    commander_id: Mapped[str | None] = mapped_column(
        String, ForeignKey("cards.id")
    )
    created_at: Mapped[DateTime] = mapped_column(
        DateTime(timezone=True), server_default=func.now()
    )
    updated_at: Mapped[DateTime] = mapped_column(
        DateTime(timezone=True), server_default=func.now()
    )
    deck_cards: Mapped[list["DeckCard"]] = relationship(
        "DeckCard", back_populates="deck", cascade="all, delete-orphan"
    )

class DeckCard(Base):
    __tablename__ = "deck_cards"

    id: Mapped[str] = mapped_column(
        String, primary_key=True, default=lambda: str(uuid.uuid4())
    )
    deck_id: Mapped[str] = mapped_column(
        String, ForeignKey("decks.id", ondelete="CASCADE"),
        nullable=False, index=True
    )
    scryfall_id: Mapped[str] = mapped_column(
        String, ForeignKey("cards.id"), nullable=False
    )
    quantity: Mapped[int] = mapped_column(Integer, default=1)
    board: Mapped[str] = mapped_column(String, default="mainboard")
    categories: Mapped[list] = mapped_column(ARRAY(String), default=[])

            content: `<p>Scryfall publishes a <code>default_cards</code> bulk file updated every 12 hours. It's a JSON array of ~30k card objects (~100MB). Always fetch the metadata endpoint first to get the current download URL — never hardcode it.</p>
            <div class="callout"><div class="callout-label">note</div>Don't hardcode the download URL — it changes on each update. Always fetch <code>https://api.scryfall.com/bulk-data/default-cards</code> first.</div>`

            heading: "backend/app/services/scryfall_sync.py",
            code: `import httpx
from sqlalchemy.ext.asyncio import AsyncSession
from sqlalchemy.dialects.postgresql import insert as pg_insert
from app.models.models import Card
import asyncio

BULK_META_URL = "https://api.scryfall.com/bulk-data/default-cards"

def _price_cents(val: str | None) -> int | None:
    if val is None:
        return None
    try:
        return round(float(val) * 100)
    except (ValueError, TypeError):
        return None

async def sync_scryfall_bulk(db: AsyncSession) -> int:
    async with httpx.AsyncClient(timeout=300) as client:
        meta = (await client.get(BULK_META_URL)).json()
        download_url: str = meta["download_uri"]

        print(f"Downloading bulk data from {download_url}...")
        response = await client.get(download_url)
        card_array: list[dict] = response.json()

    print(f"Upserting {len(card_array)} cards...")
    BATCH = 500
    for i in range(0, len(card_array), BATCH):
        batch = card_array[i : i + BATCH]
        values = [
            {
                "id": c["id"],
                "name": c["name"],
                "set_code": c["set"],
                "set_name": c["set_name"],
                "collector_number": c["collector_number"],
                "mana_cost": c.get("mana_cost"),
                "cmc": round(c.get("cmc") or 0),
                "type_line": c.get("type_line", ""),
                "oracle_text": c.get("oracle_text"),
                "color_identity": c.get("color_identity", []),
                "rarity": c["rarity"],
                "price_usd": _price_cents(c.get("prices", {}).get("usd")),
                "price_usd_foil": _price_cents(c.get("prices", {}).get("usd_foil")),
                "price_eur": _price_cents(c.get("prices", {}).get("eur")),
                "image_uris": c.get("image_uris"),
                "legalities": c.get("legalities"),
                "scryfall_data": c,
            }
            for c in batch
        ]
        stmt = pg_insert(Card).values(values)
        stmt = stmt.on_conflict_do_update(
            index_elements=["id"],
            set_={
                "name": stmt.excluded.name,
                "price_usd": stmt.excluded.price_usd,
                "price_usd_foil": stmt.excluded.price_usd_foil,
                "price_eur": stmt.excluded.price_eur,
                "scryfall_data": stmt.excluded.scryfall_data,
            },
        )
        await db.execute(stmt)
        await db.commit()
        if i % 5000 == 0:
            print(f"  {i} / {len(card_array)}")

    print("Bulk sync complete.")
    return len(card_array)`

from strawberry.types import Info
from sqlalchemy import select, or_, func
from app.models.models import Card
from app.graphql.types import CardType
from typing import Optional

def _to_card_type(c: Card) -> CardType:
    return CardType(
        id=c.id, name=c.name, set_code=c.set_code,
        set_name=c.set_name, collector_number=c.collector_number,
        mana_cost=c.mana_cost, cmc=c.cmc, type_line=c.type_line,
        oracle_text=c.oracle_text, color_identity=c.color_identity or [],
        rarity=c.rarity, price_usd=c.price_usd,
        price_usd_foil=c.price_usd_foil, price_eur=c.price_eur,
    )

@strawberry.type
class CardsQuery:
    @strawberry.field
    async def search_cards(
        self, info: Info, query: str, limit: int = 20
    ) -> list[CardType]:
        db = info.context["db"]
        stmt = (
            select(Card)
            .where(func.lower(Card.name).contains(query.lower()))
            .limit(min(limit, 50))
        )
        result = await db.execute(stmt)
        return [_to_card_type(c) for c in result.scalars()]

    @strawberry.field
    async def card_by_id(
        self, info: Info, id: str
    ) -> Optional[CardType]:
        db = info.context["db"]
        result = await db.execute(select(Card).where(Card.id == id))
        card = result.scalar_one_or_none()
        return _to_card_type(card) if card else None`

            code: `import csv
import io
from dataclasses import dataclass
from typing import Literal

CardCondition = Literal["NM", "LP", "MP", "HP", "DMG"]

@dataclass
class CanonicalCard:
    scryfall_id: str
    quantity: int
    foil: bool
    condition: CardCondition
    language: str
    purchase_price: float | None = None

MANABOX_TO_CANONICAL: dict[str, CardCondition] = {
    "Near Mint": "NM",
    "Lightly Played": "LP",
    "Moderately Played": "MP",
    "Heavily Played": "HP",
    "Damaged": "DMG",
}
CANONICAL_TO_MANABOX = {v: k for k, v in MANABOX_TO_CANONICAL.items()}

def from_manabox(csv_text: str) -> list[CanonicalCard]:
    reader = csv.DictReader(io.StringIO(csv_text))
    cards = []
    for row in reader:
        cards.append(CanonicalCard(
            scryfall_id=row["Scryfall ID"],
            quantity=int(row.get("Quantity", 1) or 1),
            foil=row.get("Foil", "").lower() == "foil",
            condition=MANABOX_TO_CANONICAL.get(row.get("Condition", ""), "NM"),
            language=row.get("Language", "en") or "en",
            purchase_price=float(row["Purchase Price"]) if row.get("Purchase Price") else None,
        ))
    return cards

def to_manabox(cards: list[CanonicalCard]) -> str:
    fieldnames = ["Scryfall ID", "Quantity", "Foil", "Condition", "Language", "Purchase Price"]
    out = io.StringIO()
    writer = csv.DictWriter(out, fieldnames=fieldnames)
    writer.writeheader()
    for c in cards:
        writer.writerow({
            "Scryfall ID": c.scryfall_id,
            "Quantity": c.quantity,
            "Foil": "foil" if c.foil else "",
            "Condition": CANONICAL_TO_MANABOX.get(c.condition, "Near Mint"),
            "Language": c.language,
            "Purchase Price": str(c.purchase_price) if c.purchase_price else "",
        })
    return out.getvalue()

MOXFIELD_CONDITION_MAP: dict[str, CardCondition] = {
    "NM": "NM", "LP": "LP", "MP": "MP", "HP": "HP", "DMG": "DMG",
}

def from_moxfield(csv_text: str) -> list[CanonicalCard]:
    reader = csv.DictReader(io.StringIO(csv_text))
    cards = []
    for row in reader:
        cards.append(CanonicalCard(
            scryfall_id=row["Scryfall ID"],
            quantity=int(row.get("Count", 1) or 1),
            foil=row.get("Foil", "").lower() in ("foil", "etched"),
            condition=MOXFIELD_CONDITION_MAP.get(row.get("Condition", "NM"), "NM"),
            language=row.get("Language", "en") or "en",
        ))
    return cards

def to_moxfield(cards: list[CanonicalCard]) -> str:
    fieldnames = ["Count", "Scryfall ID", "Condition", "Foil", "Language"]
    out = io.StringIO()
    writer = csv.DictWriter(out, fieldnames=fieldnames)
    writer.writeheader()
    for c in cards:
        writer.writerow({
            "Count": c.quantity,
            "Scryfall ID": c.scryfall_id,
            "Condition": c.condition,
            "Foil": "foil" if c.foil else "",
            "Language": c.language,
        })
    return out.getvalue()

def from_archidekt(csv_text: str) -> list[CanonicalCard]:
    reader = csv.DictReader(io.StringIO(csv_text))
    cards = []
    for row in reader:
        cards.append(CanonicalCard(
            scryfall_id=row["scryfall_id"],
            quantity=int(row.get("quantity", 1) or 1),
            foil=row.get("foil", "").lower() == "true",
            condition=MOXFIELD_CONDITION_MAP.get(row.get("condition", "NM"), "NM"),
            language="en",
        ))
    return cards

def to_archidekt(cards: list[CanonicalCard]) -> str:
    fieldnames = ["quantity", "scryfall_id", "condition", "foil"]
    out = io.StringIO()
    writer = csv.DictWriter(out, fieldnames=fieldnames)
    writer.writeheader()
    for c in cards:
        writer.writerow({
            "quantity": c.quantity,
            "scryfall_id": c.scryfall_id,
            "condition": c.condition,
            "foil": str(c.foil).lower(),
        })
    return out.getvalue()

CollectionFormat = Literal["manabox", "moxfield", "archidekt"]

FROM_ADAPTERS = {"manabox": from_manabox, "moxfield": from_moxfield, "archidekt": from_archidekt}
TO_ADAPTERS = {"manabox": to_manabox, "moxfield": to_moxfield, "archidekt": to_archidekt}

def convert(csv_text: str, from_fmt: CollectionFormat, to_fmt: CollectionFormat) -> tuple[str, int]:
    canonical = FROM_ADAPTERS[from_fmt](csv_text)
    output = TO_ADAPTERS[to_fmt](canonical)
    return output, len(canonical)`

from datetime import date
from sqlalchemy.ext.asyncio import AsyncSession
from sqlalchemy import select, text
from sqlalchemy.dialects.postgresql import insert as pg_insert
from app.models.models import CollectionItem, Card, PriceHistory

async def take_price_snapshot(db: AsyncSession) -> int:
    today = date.today().isoformat()

    # Get unique scryfall IDs from collection
    result = await db.execute(
        select(CollectionItem.scryfall_id).distinct()
    )
    ids = [row[0] for row in result]

    count = 0
    for scryfall_id in ids:
        card_result = await db.execute(
            select(Card.price_usd, Card.price_usd_foil, Card.price_eur)
            .where(Card.id == scryfall_id)
        )
        card = card_result.first()
        if not card:
            continue

        stmt = pg_insert(PriceHistory).values(
            id=str(uuid.uuid4()),
            scryfall_id=scryfall_id,
            price_usd=card.price_usd,
            price_usd_foil=card.price_usd_foil,
            price_eur=card.price_eur,
            snapshot_date=today,
        ).on_conflict_do_nothing()

        await db.execute(stmt)
        count += 1

    await db.commit()
    return count`

    cached = result.scalar_one_or_none()
    if cached and cached.expires_at > datetime.utcnow():
        return _parse_recommendations(cached.data)

    # Cache miss — fetch fresh
    url = f"https://json.edhrec.com/pages/commanders/{slug}.json"
    async with httpx.AsyncClient(timeout=30) as client:
        response = await client.get(url)
        response.raise_for_status()
        fresh_data = response.json()

    expires = datetime.utcnow() + timedelta(days=7)

    if cached:
        cached.data = fresh_data
        cached.expires_at = expires
    else:
        db.add(EdhrecCache(
            id=str(uuid.uuid4()),
            slug=slug,
            data=fresh_data,
            expires_at=expires,
        ))

    await db.commit()
    return _parse_recommendations(fresh_data)`
          },
          {
            heading: "EDHRec resolver",
            code: `# Add to backend/app/graphql/schema.py or a new resolvers/edhrec.py

@strawberry.type
class EdhrecRecommendation:
    name: str
    synergy_score: float
    inclusion_rate: float
    owned: bool = False  # set by joining against collection

@strawberry.type
class EdhrecQuery:
    @strawberry.field
    async def edhrec_recommendations(
        self, info: Info, commander_name: str
    ) -> list[EdhrecRecommendation]:
        db = info.context["db"]
        recs = await get_edhrec_recs(db, commander_name)
        # TODO: join against collection to set owned=True
        return [EdhrecRecommendation(**r, owned=False) for r in recs]`

const completed = new Set();
let currentLesson = null;
let allLessons = [];
LESSONS.forEach(ch => ch.lessons.forEach(l => allLessons.push(l)));

function updateProgress() {
  const pct = Math.round((completed.size / allLessons.length) * 100);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-label").textContent = completed.size + " / " + allLessons.length;
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  LESSONS.forEach(chapter => {
    const group = document.createElement("div");
    group.className = "chapter-group";
    group.innerHTML = `<div class="chapter-label">${chapter.chapter}</div>`;
    chapter.lessons.forEach(lesson => {
      const btn = document.createElement("button");
      btn.className = "lesson-btn" +
        (currentLesson?.id === lesson.id ? " active" : "") +
        (completed.has(lesson.id) ? " done" : "");
      btn.innerHTML = `<span class="dot"></span><span>${lesson.id}. ${lesson.title}</span>`;
      btn.onclick = () => showLesson(lesson);
      group.appendChild(btn);
    });
    sidebar.appendChild(group);
  });
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderSection(s) {
  let html = `<div class="section"><div class="section-heading">${s.heading}</div>`;
  if (s.content) html += `<div class="prose">${s.content}</div>`;
  if (s.code) html += `<pre><code>${esc(s.code)}</code></pre>`;
  if (s.type === "steps" && s.steps) {
    html += `<ol class="step-list">${s.steps.map(st => `<li>${st}</li>`).join("")}</ol>`;
  }
  html += `</div>`;
  return html;
}

const TAG_LABELS = { ts: "TypeScript", py: "Python", gql: "GraphQL", pg: "PostgreSQL", infra: "Infra" };

function showLesson(lesson) {
  currentLesson = lesson;
  const idx = allLessons.findIndex(l => l.id === lesson.id);
  const tagsHtml = (lesson.tags || []).map(t =>
    `<span class="tag tag-${t}">${TAG_LABELS[t] || t}</span>`
  ).join("");

  const isDone = completed.has(lesson.id);
  const hasPrev = idx > 0;
  const hasNext = idx < allLessons.length - 1;

  document.getElementById("content").innerHTML = `
    <div class="lesson-header">
      <div class="lesson-num">Lesson ${lesson.id}</div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="tags">${tagsHtml}</div>
      <div class="lesson-subtitle">${lesson.subtitle}</div>
    </div>
    ${lesson.sections.map(renderSection).join("")}
    <div class="nav-row">
      <button class="nav-btn" onclick="navigate(-1)" ${!hasPrev ? "disabled" : ""}>&larr; Prev</button>
      <button class="complete-btn ${isDone ? "completed" : ""}" onclick="markDone('${lesson.id}')">
        ${isDone ? "Completed ✓" : "Mark complete"}
      </button>
      <button class="nav-btn primary" onclick="navigate(1)" ${!hasNext ? "disabled" : ""}>Next &rarr;</button>
    </div>
  `;
  renderSidebar();
}

function navigate(dir) {
  const idx = allLessons.findIndex(l => l.id === currentLesson?.id);
  const next = allLessons[idx + dir];
  if (next) showLesson(next);
}

function markDone(id) {
  completed.has(id) ? completed.delete(id) : completed.add(id);
  updateProgress();
  showLesson(currentLesson);
}

showLesson(allLessons[0]);
updateProgress();
</script>
